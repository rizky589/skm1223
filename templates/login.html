{% extends "base.html" %}

{% block content %}
<div class="form-card" style="max-width: 400px; margin-top: 4rem;">
    <a href="{{ url_for('index') }}" class="btn btn-outline" style="font-size: 0.875rem; margin-bottom: 1rem; display: inline-block;">&larr; Kembali ke Beranda</a>
    <h2 style="color: var(--bps-blue); text-align: center; margin-bottom: 2rem;">Admin Login</h2>
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        
        <button type="submit" class="btn btn-blue" style="width: 100%; margin-top: 1rem;">Login</button>
    </form>
</div>
{% endblock %}
